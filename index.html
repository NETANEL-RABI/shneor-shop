<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שניאור | ציוד לגן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        #promo-modal { display: none; }
        #promo-modal.show-promo { display: flex !important; }
        #side-cart { transform: translateX(100%); transition: transform 0.3s ease; }
        #side-cart.show-cart { transform: translateX(0); }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="promo-modal" class="fixed inset-0 bg-black/70 z-[200] items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border-4 border-green-500 relative">
            <button onclick="window.closePromo()" class="absolute top-4 right-4 text-gray-400 text-2xl">&times;</button>
            <div class="text-5xl mb-4">🎁</div>
            <h2 class="text-3xl font-black text-green-600 mb-2">מבצע מיוחד!</h2>
            <p class="text-xl font-bold text-slate-700 mb-6">30% הנחה על כל האתר</p>
            <button onclick="window.closePromo()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">איזה כיף!</button>
        </div>
    </div>

    <nav class="bg-white shadow-sm sticky top-0 z-40 py-4 px-6 flex justify-between items-center border-b">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.showSection('shop')">
                <div class="bg-green-100 p-2 rounded-lg text-xl">🧸</div>
                <h1 class="text-2xl font-extrabold text-green-700">שניאור <span class="text-slate-400 font-light text-lg">ציוד לגן</span></h1>
            </div>
            <button onclick="window.showSection('about')" class="mr-4 text-slate-600 font-bold hover:text-green-600 border-r pr-4">אודות</button>
        </div>
        <div class="relative cursor-pointer" onclick="window.toggleCart()">
            <span class="text-3xl">🛒</span>
            <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <section id="about-section" class="container mx-auto p-8 mt-10 hidden max-w-3xl bg-white rounded-[3rem] shadow-xl text-center">
        <h2 class="text-4xl font-black text-slate-800 mb-6">אודות שניאור</h2>
        <p class="text-xl text-slate-600 leading-relaxed text-right">שניאור הוקמה כדי להעניק לגננות פתרונות יצירתיים, איכותיים ומעוצבים. כל ערכה ומוצר נבחרים בקפידה כדי לשדרג את חוויית הלמידה בגן.</p>
        <button onclick="window.showSection('shop')" class="mt-8 bg-green-600 text-white px-8 py-3 rounded-xl font-bold">חזרה לחנות</button>
    </section>

    <div id="shop-section">
        <section class="container mx-auto p-6 mt-4">
            <div class="bg-white rounded-3xl shadow-sm p-4 flex flex-col md:flex-row gap-4 items-center">
                <input type="text" id="searchInput" onkeyup="window.filterProducts()" placeholder="חפשי מוצר..." 
                    class="w-full md:w-1/3 p-3 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-green-400 text-right text-lg">
                
                <div class="flex gap-2 overflow-x-auto w-full no-scrollbar">
                    <button onclick="window.filterByCategory('הכל')" class="cat-btn bg-green-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-sm whitespace-nowrap">הכל</button>
                    <button onclick="window.filterByCategory('עונות')" class="cat-btn bg-slate-100 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-200 whitespace-nowrap">עונות</button>
                    <button onclick="window.filterByCategory('למידה')" class="cat-btn bg-slate-100 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-200 whitespace-nowrap">למידה</button>
                    <button onclick="window.filterByCategory('קישוט')" class="cat-btn bg-slate-100 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-200 whitespace-nowrap">קישוט</button>
                </div>
            </div>
        </section>
        <main class="container mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="product-grid"></main>
    </div>

    <div id="side-cart" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white shadow-2xl z-[110] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="text-xl font-extrabold">הסל שלי</h3>
            <button onclick="window.toggleCart()" class="text-3xl text-slate-300">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t bg-slate-50 space-y-4 text-right">
            <input type="text" id="customerName" placeholder="שם הגננת" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500">
            <div class="flex justify-between text-2xl font-black mb-4">
                <span>סה"כ:</span>
                <span id="cart-total">₪0</span>
            </div>
            
            <p class="text-sm font-bold text-slate-500 mb-2">בחרי שיטת תשלום:</p>
            <div class="grid grid-cols-1 gap-2">
                <button onclick="window.sendOrder('whatsapp')" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2">שליחה בוואטסאפ 💬</button>
                <button onclick="window.sendOrder('credit')" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-xl flex items-center justify-center gap-2">תשלום באשראי 💳</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
