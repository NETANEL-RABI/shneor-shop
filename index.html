<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>שנאור - מוצרים לגננות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; }</style>
</head>
<body class="bg-gray-50 text-right">
    <nav class="bg-white shadow p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-green-600">החנות של שנאור</h1>
        <div class="cursor-pointer text-2xl" onclick="document.getElementById('side-cart').classList.toggle('-translate-x-full')">
            🛒 <span id="cart-count" class="bg-red-500 text-white rounded-full px-2 text-xs relative -top-3 right-2">0</span>
        </div>
    </nav>
    <header class="bg-green-100 py-10 text-center">
        <h2 class="text-3xl font-bold">מוצרים איכותיים לגננות</h2>
        <p class="text-gray-600">כל מה שצריך לגן במקום אחד</p>
    </header>
    <main class="container mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="product-grid"></main>
    
    <div id="side-cart" class="fixed top-0 left-0 h-full w-80 bg-white shadow-2xl transform -translate-x-full transition-transform p-6 z-[60]">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-xl">הסל שלי</h3>
            <button onclick="document.getElementById('side-cart').classList.add('-translate-x-full')" class="text-gray-400 text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="space-y-4 mb-6 overflow-y-auto h-3/4"></div>
        <div class="border-t pt-4">
            <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">הזמנה בוואטסאפ</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
