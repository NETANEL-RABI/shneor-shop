<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שנאור | ציוד לגן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        #promo-modal { display: none; }
        #promo-modal.show-promo { display: flex !important; }
        #side-cart { transform: translateX(100%); transition: transform 0.3s ease; }
        #side-cart.show-cart { transform: translateX(0); }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="promo-modal" class="fixed inset-0 bg-black/70 z-[200] items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border-4 border-green-500 relative">
            <button onclick="window.closePromo()" class="absolute top-4 right-4 text-gray-400 text-2xl hover:text-black">&times;</button>
            <div class="text-5xl mb-4">🎁</div>
            <h2 class="text-3xl font-black text-green-600 mb-2">מבצע מיוחד!</h2>
            <p class="text-xl font-bold text-slate-700 mb-6">30% הנחה על כל האתר</p>
            <button onclick="window.closePromo()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">איזה כיף!</button>
        </div>
    </div>

    <nav class="bg-white shadow-sm sticky top-0 z-40 py-4 px-6 flex justify-between items-center border-b">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.showSection('shop')">
                <div class="bg-green-100 p-2 rounded-lg text-xl">🧸</div>
                <h1 class="text-2xl font-extrabold text-green-700">שנאור <span class="text-slate-400 font-light text-lg">ציוד לגן</span></h1>
            </div>
            <button onclick="window.showSection('about')" class="mr-4 text-slate-600 font-bold hover:text-green-600 border-r pr-4">אודות</button>
        </div>
        <div class="relative cursor-pointer" onclick="window.toggleCart()">
            <span class="text-3xl">🛒</span>
            <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
        </div>
    </nav>

    <section id="about-section" class="container mx-auto p-8 mt-10 hidden max-w-3xl bg-white rounded-[3rem] shadow-xl text-center border">
        <h2 class="text-4xl font-black text-slate-800 mb-6">אודות שנאור</h2>
        <p class="text-xl text-slate-600 leading-relaxed text-right">שנאור הוקמה כדי לספק לגננות פתרונות עיצוביים ופדגוגיים ברמה הגבוהה ביותר. כל מוצר נבחר כדי להפוך את הגן למקום שמח ומלמד יותר.</p>
        <button onclick="window.showSection('shop')" class="mt-8 bg-green-600 text-white px-8 py-3 rounded-xl font-bold">חזרה לחנות</button>
    </section>

    <div id="shop-section">
        <main class="container mx-auto p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="product-grid"></main>
    </div>

    <div id="side-cart" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-white shadow-2xl z-[110] flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="text-xl font-extrabold">פרטי הזמנה</h3>
            <button onclick="window.toggleCart()" class="text-3xl text-slate-300">&times;</button>
        </div>
        
        <div id="cart-items" class="p-4 border-b max-h-40 overflow-y-auto bg-slate-50/50"></div>

        <div class="p-6 flex-grow overflow-y-auto space-y-4 text-right">
            <div>
                <label class="block font-bold text-sm mb-1">שם הגננת / הגן:</label>
                <input type="text" id="custName" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500" placeholder="שם מלא">
            </div>
            <div>
                <label class="block font-bold text-sm mb-1">מספר טלפון:</label>
                <input type="tel" id="custPhone" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500" placeholder="050-0000000">
            </div>
            <div>
                <label class="block font-bold text-sm mb-1">כתובת למשלוח:</label>
                <textarea id="custAddress" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-500" rows="2" placeholder="עיר, רחוב ומספר"></textarea>
            </div>

            <div class="flex justify-between text-2xl font-black pt-4 border-t">
                <span>סה"כ:</span>
                <span id="cart-total">₪0</span>
            </div>
            
            <div class="grid grid-cols-1 gap-3 mt-4">
                <button onclick="window.handleOrder('whatsapp')" class="w-full bg-green-500 text-white py-3 rounded-2xl font-bold shadow-lg hover:bg-green-600 transition-all flex items-center justify-center gap-2">
                    <span>שלחי הזמנה בוואטסאפ 💬</span>
                </button>
                <button onclick="window.handleOrder('email')" class="w-full bg-slate-800 text-white py-3 rounded-2xl font-bold shadow-lg hover:bg-slate-900 transition-all flex flex-col items-center">
                    <span>אישור פרטים ותשלום באשראי 💳</span>
                    <span class="text-[10px] opacity-70">(הפרטים יישלחו אלינו במייל)</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
