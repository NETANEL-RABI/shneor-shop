<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>החנות של שנאור - מוצרים לגננות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; scroll-behavior: smooth; }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-lg sticky top-0 z-50 py-4 px-6 flex justify-between items-center">
        <h1 class="text-2xl font-extrabold text-green-600 tracking-tight">שנאור <span class="text-gray-400 font-light">| ציוד לגן</span></h1>
        <div class="flex items-center gap-4">
            <div class="relative cursor-pointer group" onclick="toggleCart()">
                <span class="text-3xl transition group-hover:scale-110 block">🛒</span>
                <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
            </div>
        </div>
    </nav>

    <section class="bg-white border-b p-6">
        <div class="container mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="חפשי מוצר... (למשל: סתיו, לוח, מארז)" 
                class="w-full md:w-1/3 p-3 border rounded-full focus:ring-2 focus:ring-green-500 outline-none shadow-sm">
            
            <div class="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 md:pb-0">
                <button onclick="filterByCategory('הכל')" class="bg-green-600 text-white px-4 py-2 rounded-full text-sm font-bold shadow-md">הכל</button>
                <button onclick="filterByCategory('עונות')" class="bg-white border px-4 py-2 rounded-full text-sm hover:bg-gray-100 transition">עונות</button>
                <button onclick="filterByCategory('למידה')" class="bg-white border px-4 py-2 rounded-full text-sm hover:bg-gray-100 transition">למידה</button>
                <button onclick="filterByCategory('קישוט')" class="bg-white border px-4 py-2 rounded-full text-sm hover:bg-gray-100 transition">קישוט</button>
            </div>
        </div>
    </section>

    <main class="container mx-auto p-8">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

    <div id="side-cart" class="fixed top-0 left-0 h-full w-full md:w-96 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <h3 class="text-2xl font-bold">ההזמנה שלי</h3>
            <button onclick="toggleCart()" class="text-3xl text-gray-400 hover:text-black">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-4"></div>

        <div class="border-t pt-4 space-y-3">
            <input type="text" id="customerName" placeholder="שם הגננת" class="w-full p-2 border rounded">
            <input type="text" id="gardenName" placeholder="שם הגן" class="w-full p-2 border rounded">
            <div class="flex justify-between text-xl font-bold py-2">
                <span>סה"כ:</span>
                <span id="cart-total">₪0</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg transition">
                שליחת הזמנה לוואטסאפ
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
